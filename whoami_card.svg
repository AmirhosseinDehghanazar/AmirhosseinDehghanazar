<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13131f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="amberBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="860" height="420" rx="16" fill="url(#bg)"/>
  <!-- border -->
  <rect width="860" height="420" rx="16" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- top accent bar -->
  <rect x="0" y="0" width="860" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- ── LEFT COLUMN: identity ──────────────────────────────── -->

  <!-- Avatar circle -->
  <circle cx="80" cy="90" r="42" fill="#1e1e3f" stroke="url(#accentBar)" stroke-width="2.5"/>
  <text x="80" y="98" font-family="Segoe UI,Arial" font-size="36" fill="#e2e8f0" text-anchor="middle">A</text>

  <!-- Name -->
  <text x="148" y="72" font-family="Segoe UI,Arial" font-size="20" font-weight="700" fill="#e2e8f0">Amirhossein Dehghaniazar</text>
  <!-- Role pill -->
  <rect x="148" y="82" width="194" height="22" rx="11" fill="#6366f1" fill-opacity="0.18" stroke="#6366f1" stroke-width="1" stroke-opacity="0.5"/>
  <text x="245" y="97" font-family="Segoe UI,Arial" font-size="12" fill="#a5b4fc" text-anchor="middle">Frontend Engineer</text>
  <!-- Location -->
  <text x="148" y="122" font-family="Segoe UI,Arial" font-size="13" fill="#64748b">📍 Tehran, Iran</text>

  <!-- divider -->
  <rect x="32" y="148" width="390" height="1" fill="#2d2d4e"/>

  <!-- Stack labels -->
  <text x="32" y="175" font-family="Segoe UI,Arial" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="1">STACK</text>

  <!-- Stack pills -->
  <!-- React -->
  <rect x="32" y="185" width="72" height="24" rx="12" fill="#20232a" stroke="#61dafb" stroke-width="1"/>
  <text x="68" y="201" font-family="Segoe UI,Arial" font-size="12" fill="#61dafb" text-anchor="middle">React</text>
  <!-- Next.js -->
  <rect x="112" y="185" width="70" height="24" rx="12" fill="#111" stroke="#e2e8f0" stroke-width="1"/>
  <text x="147" y="201" font-family="Segoe UI,Arial" font-size="12" fill="#e2e8f0" text-anchor="middle">Next.js</text>
  <!-- Vue -->
  <rect x="190" y="185" width="60" height="24" rx="12" fill="#1a2e1a" stroke="#4FC08D" stroke-width="1"/>
  <text x="220" y="201" font-family="Segoe UI,Arial" font-size="12" fill="#4FC08D" text-anchor="middle">Vue.js</text>
  <!-- TypeScript -->
  <rect x="258" y="185" width="90" height="24" rx="12" fill="#001f3f" stroke="#007ACC" stroke-width="1"/>
  <text x="303" y="201" font-family="Segoe UI,Arial" font-size="12" fill="#007ACC" text-anchor="middle">TypeScript</text>
  <!-- TF.js -->
  <rect x="356" y="185" width="70" height="24" rx="12" fill="#1f1500" stroke="#FF6F00" stroke-width="1"/>
  <text x="391" y="201" font-family="Segoe UI,Arial" font-size="12" fill="#FF6F00" text-anchor="middle">TF.js</text>

  <!-- divider -->
  <rect x="32" y="224" width="390" height="1" fill="#2d2d4e"/>

  <!-- Bio text -->
  <text x="32" y="248" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">4+ years shipping production apps.</text>
  <text x="32" y="268" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">Currently @ <tspan fill="#a5b4fc" font-weight="600">Lavan</tspan> — Vue 3 + Nuxt.js</text>
  <text x="32" y="288" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">Co-founded a platform that hit <tspan fill="#fbbf24" font-weight="600">12,000+ MAU</tspan></text>
  <text x="32" y="308" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">ML inference in the browser via TensorFlow.js</text>
  <text x="32" y="328" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">Published technical author on Medium</text>
  <text x="32" y="354" font-family="Segoe UI,Arial" font-size="12" fill="#475569">✉  a.dehghanazar@gmail.com</text>
  <text x="32" y="374" font-family="Segoe UI,Arial" font-size="12" fill="#475569" font-style="italic">"It's not a bug — it's an undocumented feature 🤫"</text>

  <!-- ── VERTICAL DIVIDER ──────────────────────────────────── -->
  <rect x="450" y="28" width="1" height="370" fill="#2d2d4e"/>

  <!-- ── RIGHT COLUMN: metrics ─────────────────────────────── -->
  <text x="486" y="62" font-family="Segoe UI,Arial" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="1">PERFORMANCE WINS</text>

  <!-- Metric 1: Lighthouse -->
  <text x="486" y="92" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">Lighthouse Score</text>
  <rect x="486" y="100" width="340" height="8" rx="4" fill="#1e1e3f"/>
  <rect x="486" y="100" width="323" height="8" rx="4" fill="url(#accentBar)"/>
  <text x="838" y="110" font-family="Segoe UI,Arial" font-size="12" font-weight="700" fill="#a5b4fc" text-anchor="end">95+</text>

  <!-- Metric 2: Bundle -->
  <text x="486" y="132" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">Bundle Size Reduction</text>
  <rect x="486" y="140" width="340" height="8" rx="4" fill="#1e1e3f"/>
  <rect x="486" y="140" width="204" height="8" rx="4" fill="url(#amberBar)"/>
  <text x="838" y="150" font-family="Segoe UI,Arial" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="end">−60%</text>

  <!-- Metric 3: TTI -->
  <text x="486" y="172" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">Time to Interactive Drop</text>
  <rect x="486" y="180" width="340" height="8" rx="4" fill="#1e1e3f"/>
  <rect x="486" y="180" width="136" height="8" rx="4" fill="url(#greenBar)"/>
  <text x="838" y="190" font-family="Segoe UI,Arial" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="end">−40%</text>

  <!-- Metric 4: Re-renders -->
  <text x="486" y="212" font-family="Segoe UI,Arial" font-size="13" fill="#94a3b8">Re-renders Eliminated</text>
  <rect x="486" y="220" width="340" height="8" rx="4" fill="#1e1e3f"/>
  <rect x="486" y="220" width="102" height="8" rx="4" fill="#ec4899" opacity="0.85"/>
  <text x="838" y="230" font-family="Segoe UI,Arial" font-size="12" font-weight="700" fill="#f9a8d4" text-anchor="end">~30%</text>

  <!-- divider -->
  <rect x="470" y="248" width="370" height="1" fill="#2d2d4e"/>

  <!-- STAT TILES row -->
  <!-- tile 1 -->
  <rect x="470" y="264" width="150" height="72" rx="12" fill="#1e1e3f" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <text x="545" y="296" font-family="Segoe UI,Arial" font-size="26" font-weight="800" fill="#a5b4fc" text-anchor="middle">4+</text>
  <text x="545" y="318" font-family="Segoe UI,Arial" font-size="11" fill="#64748b" text-anchor="middle">Years Experience</text>

  <!-- tile 2 -->
  <rect x="634" y="264" width="100" height="72" rx="12" fill="#1f1500" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="684" y="296" font-family="Segoe UI,Arial" font-size="26" font-weight="800" fill="#fbbf24" text-anchor="middle">12K</text>
  <text x="684" y="318" font-family="Segoe UI,Arial" font-size="11" fill="#64748b" text-anchor="middle">MAU</text>

  <!-- tile 3 -->
  <rect x="748" y="264" width="82" height="72" rx="12" fill="#0f1f0f" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="789" y="296" font-family="Segoe UI,Arial" font-size="26" font-weight="800" fill="#6ee7b7" text-anchor="middle">95</text>
  <text x="789" y="318" font-family="Segoe UI,Arial" font-size="11" fill="#64748b" text-anchor="middle">Lighthouse</text>

  <!-- hackathon badge -->
  <rect x="470" y="352" width="360" height="36" rx="10" fill="#1e1e3f" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <text x="650" y="375" font-family="Segoe UI,Arial" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">🏆  Divar × Lavan Hackathon 2025 — Winner</text>
</svg>